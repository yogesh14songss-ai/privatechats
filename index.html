<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔥 Chat App</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b141a;
    color:white;
}

.chat{
    display:flex;
    flex-direction:column;
    height:100vh;
}

.header{
    background:#202c33;
    padding:15px;
    text-align:center;
    font-weight:bold;
}

.box{
    flex:1;
    overflow-y:auto;
    padding:10px;
}

.msg{
    padding:10px;
    margin:5px;
    border-radius:10px;
    max-width:60%;
    word-break:break-word;
}

.me{
    background:#005c4b;
    margin-left:auto;
}

.other{
    background:#202c33;
}

.input{
    display:flex;
    padding:10px;
    background:#202c33;
    gap:5px;
}

input{
    flex:1;
    padding:10px;
    border:none;
    border-radius:20px;
}

button{
    background:#00a884;
    border:none;
    color:white;
    padding:10px;
    border-radius:50%;
}

/* overlay */
.overlay{
    position:fixed;
    inset:0;
    background:#000;
    display:flex;
    align-items:center;
    justify-content:center;
}

.card{
    background:#111b21;
    padding:20px;
    border-radius:10px;
}

/* mobile */
@media(max-width:600px){
    .msg{max-width:85%;}
}
</style>
</head>

<body>

<div id="overlay" class="overlay">
<div class="card">
<h3>Enter Name</h3>
<input id="name">
<button onclick="saveName()">Start</button>
</div>
</div>

<div class="chat">

<div id="title" class="header"></div>

<div id="chat" class="box"></div>

<div class="input">
<button onclick="addEmoji()">😀</button>
<input id="msg">
<input type="file" id="img">
<button onclick="sendMsg()">➤</button>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>

const firebaseConfig = {
    apiKey: "AIzaSyCaL_bT7HJRsYf7mhTelXBeNiJV0MQDXIs",
    authDomain: "chat-app-88556.firebaseapp.com",
    databaseURL: "https://chat-app-88556-default-rtdb.firebaseio.com/",
    projectId: "chat-app-88556"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let user = localStorage.getItem("user");
let room = localStorage.getItem("room");

if(!room){
    room = prompt("Room name:");
    localStorage.setItem("room",room);
}

document.getElementById("title").innerText="Room: "+room;

if(user){
    document.getElementById("overlay").style.display="none";
}

function saveName(){
    user=document.getElementById("name").value;
    localStorage.setItem("user",user);
    document.getElementById("overlay").style.display="none";
}

function addEmoji(){
    document.getElementById("msg").value+="😀";
}

function sendMsg(){

    let msg=document.getElementById("msg").value;
    let file=document.getElementById("img").files[0];

    if(file){
        let reader=new FileReader();

        reader.onload=function(){
            db.ref("rooms/"+room).push({
                user:user,
                text:msg,
                image:reader.result
            });
        };

        reader.readAsDataURL(file);
    }
    else{
        db.ref("rooms/"+room).push({
            user:user,
            text:msg
        });
    }

    document.getElementById("msg").value="";
    document.getElementById("img").value="";
}

db.ref("rooms/"+room).on("child_added",function(snap){

    let d=snap.val();

    let div=document.createElement("div");
    div.classList.add("msg");

    if(d.user==user){
        div.classList.add("me");
    }else{
        div.classList.add("other");
    }

    div.innerHTML="<b>"+d.user+"</b><br>"+(d.text||"");

    if(d.image){
        div.innerHTML+=`<br><img src="${d.image}" width="150">`;
    }

    document.getElementById("chat").appendChild(div);
    chat.scrollTop=chat.scrollHeight;

});

</script>

</body>
</html>
