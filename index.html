<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔥 Pro Chat</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

body{background:#0b141a;color:white}

.chat{
    display:flex;
    flex-direction:column;
    height:100vh;
    max-width:900px;
    margin:auto;
}

.header{
    background:#202c33;
    padding:15px;
    font-size:18px;
    font-weight:bold;
}

/* CHAT */
.box{
    flex:1;
    overflow-y:auto;
    padding:10px;
    display:flex;
    flex-direction:column;
}

.msg{
    max-width:70%;
    padding:10px;
    margin:6px;
    border-radius:10px;
    font-size:14px;
}

.me{background:#005c4b;align-self:flex-end;}
.other{background:#202c33;align-self:flex-start;}

.msg img{
    max-width:150px;
    margin-top:5px;
    border-radius:10px;
}

/* INPUT */
.input{
    display:flex;
    padding:10px;
    background:#202c33;
    position:sticky;
    bottom:0;
}

input{
    flex:1;
    padding:12px;
    border:none;
    border-radius:20px;
    outline:none;
}

button{
    margin-left:5px;
    background:#00a884;
    border:none;
    color:white;
    width:45px;
    height:45px;
    border-radius:50%;
}

/* NAME POPUP */
.overlay{
    position:fixed;
    inset:0;
    background:#000;
    display:flex;
    align-items:center;
    justify-content:center;
}

.card{
    background:#111b21;
    padding:20px;
    border-radius:10px;
    text-align:center;
}

.card input{
    margin-top:10px;
    width:100%;
}

/* MOBILE */
@media(max-width:600px){
    .msg{max-width:85%}
}
</style>
</head>

<body>

<!-- USER NAME -->
<div id="overlay" class="overlay">
<div class="card">
<h3>Enter Name</h3>
<input id="name">
<button onclick="saveName()">Start</button>
</div>
</div>

<div class="chat">

<div id="title" class="header"></div>

<div id="chat" class="box"></div>

<div class="input">
<button onclick="emoji()">😀</button>
<input type="file" id="img">
<input id="msg" placeholder="Type message...">
<button onclick="send()">➤</button>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>

const firebaseConfig = {
    apiKey: "AIzaSyCaL_bT7HJRsYf7mhTelXBeNiJV0MQDXIs",
    authDomain: "chat-app-88556.firebaseapp.com",
    databaseURL: "https://chat-app-88556-default-rtdb.firebaseio.com/",
    projectId: "chat-app-88556"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let user = "";
let room = "";

// ALWAYS ASK NAME
function saveName(){
    user = document.getElementById("name").value;
    if(user=="") return;

    localStorage.setItem("user", user);
    document.getElementById("overlay").style.display="none";
}

// ALWAYS ASK ROOM
room = prompt("Room name:");
document.getElementById("title").innerText="Room: "+room;

// EMOJI
function emoji(){
    document.getElementById("msg").value+="😀";
}

// SEND
function send(){

    let text = document.getElementById("msg").value;
    let file = document.getElementById("img").files[0];

    if(text=="" && !file) return;

    if(file){
        let reader = new FileReader();

        reader.onload=function(){
            db.ref("rooms/"+room).push({
                user:user,
                text:text,
                image:reader.result
            });
        };

        reader.readAsDataURL(file);
    } else {
        db.ref("rooms/"+room).push({
            user:user,
            text:text
        });
    }

    document.getElementById("msg").value="";
    document.getElementById("img").value="";
}

// RECEIVE
db.ref("rooms/"+room).on("child_added",function(s){

    let d=s.val();

    let div=document.createElement("div");
    div.className="msg "+(d.user==user?"me":"other");

    div.innerHTML="<b>"+d.user+"</b><br>"+(d.text||"");

    if(d.image){
        div.innerHTML+=`<br><img src="${d.image}">`;
    }

    document.getElementById("chat").appendChild(div);

    chat.scrollTop=chat.scrollHeight;
});

</script>

</body>
</html>
