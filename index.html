<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔥 Chat App</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b141a;
    color:white;
}

/* CHAT */
.chat{
    display:flex;
    flex-direction:column;
    height:100vh;
    max-width:900px;
    margin:auto;
}

/* HEADER */
.header{
    background:#202c33;
    padding:15px;
    text-align:center;
    font-weight:bold;
}

/* CHAT BOX */
.box{
    flex:1;
    overflow-y:auto;
    padding:12px;
    scroll-behavior:smooth;
}

/* MESSAGE */
.msg{
    padding:10px 12px;
    margin:6px;
    border-radius:12px;
    max-width:60%;
    word-break:break-word;
    font-size:15px;
}

.me{
    background:#005c4b;
    margin-left:auto;
}

.other{
    background:#202c33;
}

/* INPUT */
.input{
    display:flex;
    align-items:center;
    gap:8px;
    padding:10px;
    background:#202c33;
}

.input input[type="text"]{
    flex:1;
    padding:12px;
    border:none;
    border-radius:25px;
    font-size:15px;
}

.input input[type="file"]{
    display:none;
}

button{
    background:#00a884;
    border:none;
    color:white;
    padding:10px;
    border-radius:50%;
    font-size:16px;
}

/* USERNAME POPUP */
.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.9);
    display:flex;
    align-items:center;
    justify-content:center;
}

.card{
    background:#111b21;
    padding:25px;
    border-radius:15px;
    width:320px;
    text-align:center;
}

.card input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:10px;
    border:none;
}

.card button{
    width:100%;
    margin-top:10px;
}

/* 📱 MOBILE FIX (MAIN PART 🔥) */
@media (max-width:600px){

    .chat{
        max-width:100%;
        height:100vh;
    }

    .header{
        font-size:16px;
        padding:12px;
    }

    .box{
        padding:8px;
    }

    .msg{
        max-width:85%;
        font-size:14px;
        padding:8px 10px;
    }

    .input{
        padding:8px;
    }

    .input input[type="text"]{
        padding:12px;
        font-size:15px;
    }

    button{
        padding:10px;
        font-size:14px;
    }

    .card{
        width:90%;
    }
}
</style>
</head>

<body>

<div id="overlay" class="overlay">
<div class="card">
<h3>Enter Name</h3>
<input id="name">
<button onclick="saveName()">Start</button>
</div>
</div>

<div class="chat">

<div id="title" class="header"></div>

<div id="chat" class="box"></div>

<div class="input">
<button onclick="addEmoji()">😀</button>
<label for="img">📎</label>
<input type="file" id="img">
<input id="msg" placeholder="Type message...">
<button onclick="sendMsg()">➤</button>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>

const firebaseConfig = {
    apiKey: "AIzaSy...",
    authDomain: "chat-app-88556.firebaseapp.com",
    databaseURL: "https://chat-app-88556-default-rtdb.firebaseio.com/",
    projectId: "chat-app-88556"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let user = localStorage.getItem("user");
let room = localStorage.getItem("room");

if(!room){
    room = prompt("Room name:");
    localStorage.setItem("room",room);
}

document.getElementById("title").innerText="Room: "+room;

if(user){
    overlay.style.display="none";
}

function saveName(){
    user=name.value;
    localStorage.setItem("user",user);
    overlay.style.display="none";
}

function addEmoji(){
    msg.value+="😀";
}

function sendMsg(){

    let text=msg.value;
    let file=img.files[0];

    if(file){
        let reader=new FileReader();
        reader.onload=function(){
            db.ref("rooms/"+room).push({
                user:user,
                text:text,
                image:reader.result
            });
        };
        reader.readAsDataURL(file);
    }else{
        db.ref("rooms/"+room).push({
            user:user,
            text:text
        });
    }

    msg.value="";
    img.value="";
}

db.ref("rooms/"+room).on("child_added",function(s){

    let d=s.val();

    let div=document.createElement("div");
    div.classList.add("msg");

    if(d.user==user){
        div.classList.add("me");
    }else{
        div.classList.add("other");
    }

    div.innerHTML="<b>"+d.user+"</b><br>"+(d.text||"");

    if(d.image){
        div.innerHTML+=`<br><img src="${d.image}" style="max-width:150px;border-radius:10px;">`;
    }

    chat.appendChild(div);
    chat.scrollTop=chat.scrollHeight;

});

</script>

</body>
</html>
