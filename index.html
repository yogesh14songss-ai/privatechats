<!DOCTYPE html>
<html>
<head><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>𝓬𝓱𝓮𝓪𝓽 𝓬𝓱𝓪𝓽</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b141a;
    color:white;
}.input {
    position: sticky;
    bottom: 0;
}
    .msg {
    max-width: 80%;
    word-wrap: break-word;
    }
    @media(max-width:600px){

    .chat {
        width: 100%;
    }

    .msg {
        max-width: 85%;
        font-size: 14px;
    }

    input {
        font-size: 14px;
        padding: 10px;
    }

    button {
        width: 40px;
        height: 40px;
    }

    .header {
        font-size: 16px;
    }
    }

.chat{
    display:flex;
    flex-direction:column;
    height:100vh;
}

.header{
    background:#202c33;
    padding:15px;
    font-weight:bold;
    text-align:center;
}

.box{
    flex:1;
    overflow-y:auto;
    padding:10px;
}

.msg{
    padding:10px;
    margin:5px;
    border-radius:10px;
    max-width:60%;
}

.me{
    background:#005c4b;
    margin-left:auto;
}

.other{
    background:#202c33;
}

.input{
    display:flex;
    padding:10px;
    background:#202c33;
}

input{
    flex:1;
    padding:10px;
    border:none;
}

button{
    padding:10px;
    background:#00a884;
    border:none;
    color:white;
    cursor:pointer;
}
</style>

</head>
<body>

<div class="chat">

    <div class="header">🔥 Firebase Room Chat</div>

    <div id="chat" class="box"></div>

    <div class="input">
        <input id="msg" placeholder="Type message...">
        <button onclick="sendMsg()">Send</button>
    </div>

</div>

<!-- Firebase Scripts -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>

// 🔥 YOUR CONFIG (UPDATED)
const firebaseConfig = {
    apiKey: "AIzaSyCaL_bT7HJRsYf7mhTelXBeNiJV0MQDXIs",
    authDomain: "chat-app-88556.firebaseapp.com",
    databaseURL: "https://chat-app-88556-default-rtdb.firebaseio.com/",
    projectId: "chat-app-88556",
    storageBucket: "chat-app-88556.firebasestorage.app",
    messagingSenderId: "680656549338",
    appId: "1:680656549338:web:917c089e55d4b7427dbce3"
};

// INIT
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 👤 RANDOM USER
const user = "User" + Math.floor(Math.random()*10000);

// 🏠 ROOM SYSTEM
let room = prompt("Enter Room Name:");

if(!room){
    room = "default";
}

// 📤 SEND MESSAGE
function sendMsg(){
    let msg = document.getElementById("msg").value;

    if(msg === "") return;

    db.ref("rooms/" + room).push({
        user: user,
        text: msg
    });

    document.getElementById("msg").value="";
}

// 📥 RECEIVE MESSAGE (REAL-TIME)
db.ref("rooms/" + room).on("child_added", function(snapshot){

    let data = snapshot.val();

    let div = document.createElement("div");

    div.classList.add("msg");

    if(data.user === user){
        div.classList.add("me");
    } else {
        div.classList.add("other");
    }

    div.innerText = data.user + ": " + data.text;

    document.getElementById("chat").appendChild(div);

});
</script>

</body>
</html>
