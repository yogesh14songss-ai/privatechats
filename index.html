<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔥 Chat App</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b141a;
    color:white;
}

/* CHAT */
.chat{
    display:flex;
    flex-direction:column;
    height:100vh;
    max-width:900px;
    margin:auto;
}

.header{
    background:#202c33;
    padding:15px;
    text-align:center;
    font-weight:bold;
}

.box{
    flex:1;
    overflow-y:auto;
    padding:12px;
}

/* MESSAGE */
.msg{
    padding:10px;
    margin:6px;
    border-radius:12px;
    max-width:60%;
    word-break:break-word;
}

.me{
    background:#005c4b;
    margin-left:auto;
}

.other{
    background:#202c33;
}

/* INPUT */
.input{
    display:flex;
    gap:8px;
    padding:10px;
    background:#202c33;
}

.input input[type="text"]{
    flex:1;
    padding:12px;
    border:none;
    border-radius:25px;
}

.input input[type="file"]{
    display:none;
}

button{
    background:#00a884;
    border:none;
    color:white;
    padding:10px;
    border-radius:50%;
}

/* POPUP */
.overlay{
    position:fixed;
    inset:0;
    background:#000;
    display:flex;
    align-items:center;
    justify-content:center;
}

.card{
    background:#111b21;
    padding:20px;
    border-radius:10px;
    text-align:center;
}

/* MOBILE */
@media(max-width:600px){
    .msg{max-width:85%;}
}
</style>
</head>

<body>

<!-- USERNAME -->
<div id="overlay" class="overlay">
<div class="card">
<h3>Enter Name</h3>
<input id="name">
<button onclick="saveName()">Start</button>
</div>
</div>

<div class="chat">

<div id="title" class="header"></div>

<div id="chat" class="box"></div>

<div class="input">
<button onclick="addEmoji()">😀</button>
<label for="img">📎</label>
<input type="file" id="img">
<input id="msg" placeholder="Type message...">
<button onclick="sendMsg()">➤</button>
</div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>

const firebaseConfig = {
    apiKey: "AIzaSyCaL_bT7HJRsYf7mhTelXBeNiJV0MQDXIs",
    authDomain: "chat-app-88556.firebaseapp.com",
    databaseURL: "https://chat-app-88556-default-rtdb.firebaseio.com/",
    projectId: "chat-app-88556"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ELEMENTS
const overlay = document.getElementById("overlay");
const nameInput = document.getElementById("name");
const msgInput = document.getElementById("msg");
const imgInput = document.getElementById("img");
const chatBox = document.getElementById("chat");
const title = document.getElementById("title");

// STORAGE
let user = localStorage.getItem("user");
let room = localStorage.getItem("room");

// ROOM
if(!room){
    room = prompt("Room name:");
    localStorage.setItem("room",room);
}

title.innerText = "Room: " + room;

// USER
if(user){
    overlay.style.display="none";
}

// SAVE NAME
function saveName(){
    let name = nameInput.value.trim();
    if(name==="") return alert("Enter name");

    user = name;
    localStorage.setItem("user",user);
    overlay.style.display="none";
}

// EMOJI
function addEmoji(){
    msgInput.value += "😀";
}

// SEND
function sendMsg(){

    let text = msgInput.value.trim();
    let file = imgInput.files[0];

    if(!user){
        alert("Enter name first");
        return;
    }

    if(text === "" && !file) return;

    if(file){
        let reader = new FileReader();

        reader.onload = function(){
            db.ref("rooms/"+room).push({
                user:user,
                text:text,
                image:reader.result
            });
        };

        reader.readAsDataURL(file);
    } else {
        db.ref("rooms/"+room).push({
            user:user,
            text:text
        });
    }

    msgInput.value="";
    imgInput.value="";
}

// RECEIVE
db.ref("rooms/"+room).on("child_added",function(s){

    let d = s.val();

    let div = document.createElement("div");
    div.classList.add("msg");

    if(d.user === user){
        div.classList.add("me");
    } else {
        div.classList.add("other");
    }

    div.innerHTML = "<b>"+d.user+"</b><br>"+(d.text || "");

    if(d.image){
        div.innerHTML += `<br><img src="${d.image}" style="max-width:150px;border-radius:10px;">`;
    }

    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;

});

</script>

</body>
</html>
